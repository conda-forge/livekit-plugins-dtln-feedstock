schema_version: 1

context:
  version: 0.1.3

package:
  name: livekit-plugins-dtln
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/livekit-plugins-dtln/livekit_plugins_dtln-${{ version }}.tar.gz
  sha256: ea60e74da9419bb0a7e85a0880c61cfb01222c494279fdb95cf8b1b5129e1db8

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=70
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - livekit >=1.0.25
    - livekit-agents >=1.4.4
    - onnxruntime >=1.17.0
    - numpy >=1.26.0
tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - '*'
      imports:
        - livekit.plugins.dtln
      pip_check: true

about:
  summary: DTLN noise suppression plugin for LiveKit Agents — self-hosted, in-process, no cloud API
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/aloware/livekit-plugins-dtln

extra:
  recipe-maintainers:
    - conda-forge/livekit
