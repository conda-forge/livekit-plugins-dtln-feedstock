schema_version: 1

context:
  version: "0.1.5"

package:
  name: livekit-plugins-dtln
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/livekit-plugins-dtln/livekit_plugins_dtln-${{ version }}.tar.gz
  sha256: a1cb21d4c79e0b7eed81146b4eb8ad6ca0cc4c0fca8230bc6bde747b6aeb1581

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=70
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - livekit >=1.0.25
    - livekit-agents >=1.4.4
    - onnxruntime >=1.17.0
    - numpy >=1.26.0
tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - '*'
      imports:
        - livekit.plugins.dtln
      pip_check: true

about:
  summary: DTLN noise suppression plugin for LiveKit Agents — self-hosted, in-process, no cloud API
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/aloware/livekit-plugins-dtln

extra:
  recipe-maintainers:
    - conda-forge/livekit
